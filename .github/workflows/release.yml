name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Verify the tag matches the package version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          package_version="$(uv run python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          if [ "$tag_version" != "$package_version" ]; then
            echo "Tag $GITHUB_REF_NAME does not match pyproject version $package_version" >&2
            exit 1
          fi

      - name: Fetch H005 schemas (enables schema-validation tests)
        run: uv run python tools/fetch-schemas.py

      - name: Lint (ruff)
        run: uv run ruff check src tests examples

      - name: Type-check (mypy --strict)
        run: uv run mypy --strict src

      - name: Test (pytest)
        run: uv run pytest

      - name: Build sdist and wheel
        run: uv build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    # Environment secrets are only visible to jobs that reference their environment; if
    # PYPI_API_TOKEN lives in a differently named environment (or is a repo secret), adjust.
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
